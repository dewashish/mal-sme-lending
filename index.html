<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#FAF7EE" />
<title>Mal — UAE SME Lending</title>
<meta name="description" content="One credit platform for UAE SMEs. Pay suppliers now, get paid earlier, advance healthcare claims, run an anchor SCF auction." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23B6CFE8'/><stop offset='.5' stop-color='%23C9B7E8'/><stop offset='1' stop-color='%23FBD9B5'/></linearGradient></defs><circle cx='16' cy='16' r='14' fill='url(%23g)'/></svg>" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="mal/tokens.css" />
<style>
  html, body { margin: 0; padding: 0; background: #FAF7EE; font-family: var(--mal-font-ui); color: var(--mal-ink); }
  body { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  #root { min-height: 100vh; }
  *::-webkit-scrollbar { width: 0; height: 0; }
  /* Saved-toast */
  .mal-saved-toast {
    position: fixed; bottom: 20px; inset-inline-end: 20px; z-index: 999;
    background: var(--mal-ink); color: #FAF7EE;
    padding: 10px 14px; border-radius: 999px; font-size: 12px; font-weight: 500;
    letter-spacing: .02em;
    box-shadow: var(--mal-sh-3);
    display: inline-flex; align-items: center; gap: 8px;
    animation: mal-toast-in .2s ease-out, mal-toast-out .25s ease-in 1.4s forwards;
    pointer-events: none;
  }
  .mal-saved-toast::before {
    content: ''; width: 6px; height: 6px; border-radius: 999px; background: #6CD9A0;
  }
  @keyframes mal-toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes mal-toast-out { to { opacity: 0; transform: translateY(8px); } }
  /* App-shell top bar */
  .mal-app-bar {
    height: 52px; background: var(--mal-paper); border-bottom: 1px solid var(--mal-line);
    display: flex; align-items: center; justify-content: space-between;
    padding-inline: 16px; gap: 12px; flex-wrap: nowrap;
    position: sticky; top: 0; z-index: 50;
  }
  .mal-app-bar-actions { display: inline-flex; align-items: center; gap: 8px; }
  .mal-pill-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--mal-surface); border: 1px solid var(--mal-line);
    color: var(--mal-ink); border-radius: 999px;
    padding: 6px 12px; font-size: 12px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    transition: background .14s, border-color .14s, transform .14s;
  }
  .mal-pill-btn:hover { background: var(--mal-paper); border-color: var(--mal-primary-3); transform: translateY(-1px); }
  /* Persona card animation */
  .mal-persona-card { animation: mal-fade-up .5s ease-out backwards; }
  /* Cursor blink for demo-mode auto-typing */
  @keyframes mal-cursor-blink { from, to { opacity: 1; } 50% { opacity: 0; } }
  /* Toast pop for demo-mode notifications */
  @keyframes mal-toast-pop {
    0% { opacity: 0; transform: translateY(-12px) scale(.96); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  /* Snap animation for the day number on the circular dial */
  @keyframes mal-day-snap {
    0%   { transform: scale(.86); opacity: .4; }
    60%  { transform: scale(1.06); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  /* Top-nav section tabs (Strategy / Prototype / Financial / AI) */
  .mal-app-section-tab {
    all: unset; cursor: pointer; box-sizing: border-box;
    padding: 8px 16px; border-radius: 999px;
    font-size: 13px; font-weight: 500; color: var(--mal-mid);
    transition: background .18s, color .18s, transform .14s;
  }
  .mal-app-section-tab:hover {
    color: var(--mal-ink); background: var(--mal-surface-2);
    transform: translateY(-1px);
  }
  .mal-app-section-tab.active {
    color: #FAF7EE;
    background: var(--mal-ink);
    font-weight: 600;
  }
  /* Section page wrapper — used inside each section */
  .mal-section-page {
    min-height: calc(100vh - 56px);
    padding: 28px 24px 60px;
    max-width: 1280px;
    margin-inline: auto;
  }
  /* Decision-step row state transitions */
  @keyframes mal-decision-fade-in {
    from { opacity: 0; transform: translateY(2px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes mal-decision-fade-out {
    from { opacity: 1; }
    to   { opacity: 0; }
  }
  /* ============================================================
     Floating left dotnav (cfodeck-faithful)
     Vertical column of horizontal dashes, pinned to the left edge,
     vertically centered. Whole nav fades from .55 → .95 on hover.
     Per-dash hover shows a sliding label tooltip to the right.
     ============================================================ */
  .mal-dotnav {
    position: fixed;
    inset-inline-start: 16px;
    top: 50%; transform: translateY(-50%);
    z-index: 55;
    display: flex; flex-direction: column; gap: 10px;
    opacity: .55;
    transition: opacity .25s ease;
    padding: 14px 8px;
    background: rgba(250, 247, 238, .55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--mal-line);
    border-radius: 999px;
  }
  .mal-dotnav:hover { opacity: .98; }
  .mal-dotnav-btn {
    width: 22px; height: 6px;
    background: var(--mal-mid-2);
    border: 0; cursor: pointer;
    border-radius: 999px;
    position: relative;
    transition: width .25s ease, background .2s ease, transform .2s ease;
    padding: 0;
    display: block;
  }
  .mal-dotnav-btn:hover {
    background: var(--mal-primary-3);
    transform: scaleY(1.2);
  }
  .mal-dotnav-past { background: var(--mal-primary-3); }
  .mal-dotnav-active {
    background: var(--mal-primary);
    width: 30px;
    box-shadow: 0 0 0 4px var(--mal-primary-50);
  }
  /* Tooltip via ::after — slides in from the right (or left in RTL) */
  .mal-dotnav-btn[data-label]::after {
    content: attr(data-label);
    position: absolute;
    inset-inline-start: calc(100% + 14px);
    top: 50%;
    transform: translateY(-50%) translateX(-6px);
    font-family: var(--mal-font-mono);
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--mal-paper);
    background: var(--mal-ink);
    padding: 6px 10px;
    border-radius: 6px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s ease, transform .18s ease;
    box-shadow: var(--mal-sh-2);
  }
  [dir="rtl"] .mal-dotnav-btn[data-label]::after {
    transform: translateY(-50%) translateX(6px);
  }
  .mal-dotnav-btn:hover[data-label]::after {
    opacity: 1;
    transform: translateY(-50%) translateX(0);
  }
  /* Plan picker rows: hover bulge */
  .mal-plan-row:hover {
    transform: translateY(-1px) scale(1.005);
    box-shadow: var(--mal-sh-2) !important;
    border-color: var(--mal-primary-3) !important;
  }
  /* Day stepper buttons: subtle hover scale */
  .mal-day-step:hover { transform: scale(1.08); background: var(--mal-surface-2); }
  /* Mobile fluid container — no iPhone bezel under 720px */
  @media (max-width: 720px) {
    .mal-app-fluid { padding: 0 !important; }
    .mal-app-fluid > div > div { /* hide PrototypeChrome row spacer on mobile */
      margin-top: 0 !important;
    }
  }
  /* Make the persona-app full-bleed on mobile (no device frame) */
  .mal-mobile-fullbleed > div { display: contents; }
  .mal-mobile-fullbleed .mobile-frame-replacer {
    width: 100%; min-height: calc(100vh - 52px); background: var(--mal-surface);
    overflow-x: hidden; display: flex; flex-direction: column;
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel-standalone -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Supabase UMD (must load before our supabase-client.js) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" crossorigin="anonymous"></script>

<!-- Mal data + persistence -->
<script src="mal/i18n.js"></script>
<script src="mal/supabase-client.js"></script>
<script src="mal/session-store.js"></script>
<script src="mal/autopilot.js"></script>

<!-- Mal design system + screens -->
<script type="text/babel" src="mal/icons.jsx"></script>
<script type="text/babel" src="mal/ui.jsx"></script>
<script type="text/babel" src="mal/ios-frame.jsx"></script>
<script type="text/babel" src="mal/landing-and-system.jsx"></script>
<script type="text/babel" src="mal/prototype-shell.jsx"></script>
<script type="text/babel" src="mal/screens-onboarding.jsx"></script>
<script type="text/babel" src="mal/screens-buyer.jsx"></script>
<script type="text/babel" src="mal/screens-buyer-extend.jsx"></script>
<script type="text/babel" src="mal/screens-others.jsx"></script>
<script type="text/babel" src="mal/persona-picker.jsx"></script>
<script type="text/babel" src="mal/screens-demo-mode.jsx"></script>
<script type="text/babel" src="mal/charts.jsx"></script>
<script type="text/babel" src="mal/tour.jsx?v=20260510-5"></script>
<script src="mal/strategy-doc.js"></script>
<script src="mal/p1-model-data.js"></script>
<script src="mal/product-catalogue.js"></script>
<script type="text/babel" src="mal/section-prototype.jsx?v=20260510-5"></script>
<script type="text/babel" src="mal/section-strategy.jsx?v=20260510-5"></script>
<script type="text/babel" src="mal/section-financial.jsx?v=20260510-5"></script>
<script type="text/babel" src="mal/section-ai.jsx?v=20260510-5"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ----------------------------------------------------------------------------
// Hooks
// ----------------------------------------------------------------------------
function useIsMobile() {
  const [isMobile, setIsMobile] = useState(() =>
    typeof window !== 'undefined' && window.matchMedia
      ? window.matchMedia('(max-width: 720px)').matches
      : false
  );
  useEffect(() => {
    if (!window.matchMedia) return;
    const mq = window.matchMedia('(max-width: 720px)');
    const handler = (e) => setIsMobile(e.matches);
    mq.addEventListener ? mq.addEventListener('change', handler) : mq.addListener(handler);
    return () => mq.removeEventListener ? mq.removeEventListener('change', handler) : mq.removeListener(handler);
  }, []);
  return isMobile;
}

function useSavedToast() {
  const [visible, setVisible] = useState(false);
  const [label, setLabel] = useState('Saved');
  useEffect(() => {
    if (!window.MalSession || !window.MalSession.onSaved) return;
    const off = window.MalSession.onSaved((slice) => {
      // Don't toast for noisy meta saves
      if (slice === '__meta') return;
      setLabel('Saved · ' + slice);
      setVisible(true);
      setTimeout(() => setVisible(false), 1700);
    });
    return off;
  }, []);
  return visible ? <div className="mal-saved-toast">{label}</div> : null;
}

// ----------------------------------------------------------------------------
// AppShell — top bar + frame for the picked persona
// ----------------------------------------------------------------------------
function AppShell({ persona, initialRoute = 'home', lang, setLang, onHome, onSwitchPersona, isMobile }) {
  // Buyer + Supplier are mobile-first apps; others are desktop-first
  const personaPrefersMobile = persona === 'buyer' || persona === 'supplier' || persona === 'anchorSup';
  const [viewport, setViewport] = useState(isMobile ? 'mobile' : (personaPrefersMobile ? 'mobile' : 'desktop'));
  const [theme, setTheme] = useState('light');

  useEffect(() => {
    if (isMobile) setViewport('mobile');
  }, [isMobile, persona]);

  // Sync theme + density on root
  useEffect(() => {
    document.documentElement.dataset.theme = theme;
    document.documentElement.dataset.density = 'cozy';
  }, [theme]);

  const Ico = window.MalIcon;
  const personaLabel = (window.PersonaPicker && PERSONA_DETAILS_LOCAL[persona]) || persona;

  return (
    <div data-theme={theme} dir={lang === 'ar' ? 'rtl' : 'ltr'}
         style={{ minHeight: '100vh', background: 'var(--mal-surface)' }}>
      <div className="mal-app-bar">
        <button className="mal-pill-btn" onClick={onHome} aria-label="Home / landing">
          <span style={{ transform: lang === 'ar' ? 'scaleX(-1)' : 'none', display: 'inline-flex' }}>
            {Ico.arrowL ? Ico.arrowL({ width: 12, height: 12 }) : '←'}
          </span>
          <MalLogo size={16} />
        </button>

        <div style={{ flex: 1, display: 'flex', justifyContent: 'center', minWidth: 0 }}>
          <span style={{
            fontSize: 12, color: 'var(--mal-mid)', whiteSpace: 'nowrap',
            overflow: 'hidden', textOverflow: 'ellipsis',
          }}>
            {personaLabel}
          </span>
        </div>

        <div className="mal-app-bar-actions">
          {!isMobile && (
            <Tabs value={viewport} onChange={setViewport} size="sm" items={[
              { value: 'mobile', label: 'Mobile' }, { value: 'desktop', label: 'Desktop' },
            ]} />
          )}
          <Tabs value={lang} onChange={setLang} size="sm" items={[
            { value: 'en', label: 'EN' }, { value: 'ar', label: 'AR' },
          ]} />
          <IconBtn icon={theme === 'dark' ? 'sun' : 'moon'}
                   onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                   label="Theme" size={32} kind="default" />
          <button className="mal-pill-btn" onClick={onSwitchPersona}>
            {Ico.swap ? Ico.swap({ width: 12, height: 12 }) : null}
            {lang === 'ar' ? 'بدّل' : 'Switch'}
          </button>
        </div>
      </div>

      {/* Body */}
      {isMobile ? (
        // Full-bleed on mobile — drop the iPhone bezel; embed=true means the
        // PrototypeChrome stays out and we render PersonaApp directly.
        <FullBleedMobileApp persona={persona} lang={lang} initialRoute={initialRoute} />
      ) : (
        <div className="mal-app-fluid" style={{ padding: 24 }}>
          <MalPrototype embed
                        initialPersona={persona}
                        initialViewport={viewport}
                        initialLang={lang}
                        initialTheme={theme}
                        initialDensity="cozy"
                        initialRoute={initialRoute} />
        </div>
      )}
    </div>
  );
}

// Renders the picked persona app full-bleed on small screens (no 390px bezel).
function FullBleedMobileApp({ persona, lang, initialRoute = 'home' }) {
  const [route, setRoute] = useState(initialRoute);
  // Persist persona/lang on first mount of an app
  useEffect(() => {
    if (window.MalSession) window.MalSession.setMeta(persona, lang);
  }, [persona, lang]);

  return (
    <div dir={lang === 'ar' ? 'rtl' : 'ltr'}
         className="mal-mobile-fullbleed"
         style={{ background: 'var(--mal-surface)', minHeight: 'calc(100vh - 52px)' }}>
      <div className="mobile-frame-replacer">
        <PersonaApp persona={persona} route={route} setRoute={setRoute} lang={lang} viewport="mobile" />
      </div>
    </div>
  );
}

// Mirror of PERSONA_DETAILS for label lookup outside the picker.
const PERSONA_DETAILS_LOCAL = {
  buyer: 'Buyer SME',
  supplier: 'Supplier SME',
  hcops: 'Healthcare Provider — Ops',
  hccoder: 'Healthcare Provider — Coder',
  anchorAP: 'Anchor — AP',
  anchorSup: 'Anchor — Supplier',
};

// ----------------------------------------------------------------------------
// Root — landing → picker → app
// ----------------------------------------------------------------------------
// Top-level app — Landing → 4-section app (Strategy / Prototype / Financial / AI)
function Root() {
  const [view, setView] = useState('landing');           // 'landing' | 'app'
  const [section, setSection] = useState('prototype');   // 'strategy' | 'prototype' | 'financial' | 'ai'
  const [lang, setLang] = useState('en');
  const [hydrated, setHydrated] = useState(false);
  const isMobile = useIsMobile();

  const savedToast = useSavedToast();

  useEffect(() => {
    let alive = true;
    if (!window.MalSession) { setHydrated(true); return; }
    window.MalSession.loadState().then((cache) => {
      if (!alive) return;
      if (cache && cache.__lang) setLang(cache.__lang);
      setHydrated(true);
    });
    return () => { alive = false; };
  }, []);

  useEffect(() => {
    if (!hydrated || !window.MalSession) return;
    window.MalSession.setMeta(null, lang);
  }, [lang, hydrated]);

  // Cross-section nav listener (fired by inline links e.g. strategy → financial)
  useEffect(() => {
    const onNav = (e) => {
      const target = e?.detail?.section;
      if (target && ['strategy','prototype','financial','ai'].includes(target)) {
        setSection(target);
        setView('app');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    };
    window.addEventListener('mal:nav', onNav);
    return () => window.removeEventListener('mal:nav', onNav);
  }, []);

  return (
    <>
      {view === 'landing' && (
        <MalLanding lang={lang}
                    viewport={isMobile ? 'mobile' : 'desktop'}
                    onLaunch={(picked = 'strategy') => { setView('app'); setSection(picked); }} />
      )}

      {view === 'app' && (
        <AppFrame section={section} setSection={setSection}
                  lang={lang} setLang={setLang}
                  isMobile={isMobile}
                  onHome={() => setView('landing')}/>
      )}

      {savedToast}
    </>
  );
}

// AppFrame — top bar + section nav + body
const APP_SECTIONS = [
  { id: 'strategy',  label: 'Strategy',          shortLabel: 'Strategy' },
  { id: 'prototype', label: 'Prototype',          shortLabel: 'Prototype' },
  { id: 'financial', label: 'Economics',          shortLabel: 'Economics' },
  { id: 'ai',        label: 'AI',                 shortLabel: 'AI' },
];

function AppFrame({ section, setSection, lang, setLang, isMobile, onHome }) {
  const Ico = window.MalIcon;

  useEffect(() => {
    document.documentElement.dataset.theme = 'light';
    document.documentElement.dataset.density = 'cozy';
  }, []);

  return (
    <div data-theme="light" dir={lang === 'ar' ? 'rtl' : 'ltr'}
         style={{ minHeight: '100vh', background: 'var(--mal-surface)' }}>
      <header className="mal-app-bar">
        <button className="mal-pill-btn" onClick={onHome} aria-label="Home / landing">
          <span style={{ transform: lang === 'ar' ? 'scaleX(-1)' : 'none', display: 'inline-flex' }}>
            {Ico.arrowL ? Ico.arrowL({ width: 12, height: 12 }) : '←'}
          </span>
          <MalLogo size={16} />
        </button>

        {!isMobile && (
          <nav style={{
            flex: 1, display: 'flex', justifyContent: 'center',
            gap: 4, minWidth: 0,
          }}>
            {APP_SECTIONS.map((s) => (
              <button key={s.id}
                      onClick={() => setSection(s.id)}
                      className={`mal-app-section-tab ${section === s.id ? 'active' : ''}`}>
                {s.label}
              </button>
            ))}
          </nav>
        )}

        <div className="mal-app-bar-actions">
          <Tabs value={lang} onChange={setLang} size="sm" items={[
            { value: 'en', label: 'EN' }, { value: 'ar', label: 'AR' },
          ]} />
        </div>
      </header>

      {/* Mobile section selector */}
      {isMobile && (
        <div style={{
          display: 'flex', overflowX: 'auto', gap: 6, padding: '10px 14px',
          borderBottom: '1px solid var(--mal-line)', background: 'var(--mal-paper)',
        }}>
          {APP_SECTIONS.map((s) => (
            <button key={s.id}
                    onClick={() => setSection(s.id)}
                    className={`mal-app-section-tab ${section === s.id ? 'active' : ''}`}
                    style={{ flexShrink: 0 }}>
              {s.shortLabel}
            </button>
          ))}
        </div>
      )}

      {/* Section body */}
      <main>
        {section === 'strategy'  && <SectionStrategy   lang={lang} isMobile={isMobile}/>}
        {section === 'prototype' && <SectionPrototype  lang={lang} isMobile={isMobile}/>}
        {section === 'financial' && <SectionFinancial  lang={lang} isMobile={isMobile}/>}
        {section === 'ai'        && <SectionAi         lang={lang} isMobile={isMobile}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
